<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Practical work 1</title>
      <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.182.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.182.0/examples/jsm/"
      }
    }
  </script>
    <style>
      body { margin: 0; }
    </style>
  </head>
  <body>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        function makeWall(scene, texture, color, x, y, z) {
          const wall_g = new THREE.BoxGeometry(0.3, 10, 6);
          const wall_m = new THREE.MeshBasicMaterial( { color: color, map: texture } );
          const wall = new THREE.Mesh( wall_g, wall_m );
          wall.position.x = x
          wall.position.y = y
          wall.position.z = z
          scene.add( wall );
          return wall;
        }

        function makeKitchenCounter(scene, geometry, texture, x, y, z) {
          const counter_m = new THREE.MeshBasicMaterial( { color: 0xFFFFFF, map: texture } );
          const counter = new THREE.Mesh( geometry, counter_m );
          counter.position.x = x
          counter.position.y = y
          counter.position.z = z
          scene.add( counter );
          return counter;
        }

        function main_ex1()
        {
          const scene = new THREE.Scene()
          const camera = new THREE.PerspectiveCamera( 75, window.innerWidth / window.innerHeight, 0.1, 1000 );
          const renderer = new THREE.WebGLRenderer();
          renderer.setSize( window.innerWidth, window.innerHeight );
          document.body.appendChild( renderer.domElement );
          renderer.shadowMap.enabled = true

          camera.position.x = -0.024
          camera.position.y = -12.15
          camera.position.z = 7

          const controls = new OrbitControls( camera, renderer.domElement );

          const floor_g = new THREE.PlaneGeometry( 10, 10 );

          const loader = new THREE.TextureLoader();
          const floor_txt = loader.load( '../textures/1-fine-wood-seamless.jpg' );
          floor_txt.colorSpace = THREE.SRGBColorSpace;
          const floor_m = new THREE.MeshBasicMaterial( { map: floor_txt, side: THREE.DoubleSide } );
          const floor = new THREE.Mesh( floor_g, floor_m );
          floor_txt.wrapS = THREE.RepeatWrapping; 
          floor_txt.wrapT = THREE.RepeatWrapping;
          floor_txt.repeat.set(10, 4);
          scene.add( floor );

          const wall_txt = loader.load( '../textures/wallpaper.jpg' );
          wall_txt.colorSpace = THREE.SRGBColorSpace;
          const walls = [ 
            makeWall(scene, wall_txt, 0xFFFFFF, -5, 0, 3),
            makeWall(scene, wall_txt, 0xFFFFFF, 0, 5, 3)
          ];
          walls[1].rotation.z = Math.PI / 2

          const geometry_c1 = new THREE.BoxGeometry(2, 2, 2.5);
          const geometry_c2 = new THREE.BoxGeometry(3, 2, 2.5);
          const geometry_c3 = new THREE.BoxGeometry(2.5, 2, 2.5);
          const counter_down_txt = loader.load( '../textures/counter_down.jpg' );
          counter_down_txt.colorSpace = THREE.SRGBColorSpace;

          const geometry_c1_up = new THREE.BoxGeometry(2, 2.3, 0.1);
          const geometry_c2_up = new THREE.BoxGeometry(2.9, 2.3, 0.1);
          const geometry_c3_up = new THREE.BoxGeometry(2.5, 2.3, 0.1);
          const counter_up_txt = loader.load( '../textures/counter_up.jpg' );
          counter_up_txt.colorSpace = THREE.SRGBColorSpace;

          const kitchenCounter = [
            makeKitchenCounter(scene, geometry_c1, counter_down_txt, -4, 4, 1.25),
            makeKitchenCounter(scene, geometry_c2, counter_down_txt, -1.5, 4, 1.25 ),
            makeKitchenCounter(scene, geometry_c3, counter_down_txt, 1, 4, 1.25),
            makeKitchenCounter(scene, geometry_c1_up, counter_up_txt, -4, 4, 2.5 ),
            makeKitchenCounter(scene, geometry_c2_up, counter_up_txt, -1.6, 4, 2.5 ),
            makeKitchenCounter(scene, geometry_c3_up, counter_up_txt, 1, 4, 2.5),
          ];

          const cup_g = new THREE.CylinderGeometry( 0.25, 0.15, 0.5, 8 );
          const cup_m = new THREE.MeshPhysicalMaterial({  
            roughness: 0.1,  
            transmission: 1,  
            thickness: 0.1, 
            color: 0xB8D6DE,
            ior: 1.5
            });
          const cup = new THREE.Mesh( cup_g, cup_m );
          cup.position.x = 0
          cup.position.y = 4
          cup.position.z = 2.80
          cup.rotation.x = Math.PI/2
          scene.add( cup );
          
          const plate_g = new THREE.CylinderGeometry( 0.5, 0.3, 0.1, 17 );
          const plate_m = new THREE.MeshBasicMaterial({  color: 0xACB4B9 });
          const plate = new THREE.Mesh( plate_g, plate_m );
          plate.position.x = 1
          plate.position.y = 4
          plate.position.z = 2.6
          plate.rotation.x = Math.PI/2
          scene.add( plate );

          function animate( time ) {
              renderer.render( scene, camera);
          }
          renderer.setAnimationLoop( animate );
      }
      localStorage.setItem('savedExo1Mainfunc', main_ex1.toString());
      localStorage.setItem('savedmakeWall', makeWall.toString());
      localStorage.setItem('savedmakeKitchenCounter', makeKitchenCounter.toString());
      main_ex1()
    </script>
  </body>
</html>
